# formalization.yaml -- self-reported provenance for LeanGallery.
# Schema: https://github.com/mathlib-initiative/formalization.yaml (v0.3)
#
# Everything below is either machine-derived or explicitly marked as an estimate. Where a fact was
# not recorded at the time (per-run model versions, active effort), it says so rather than guessing.

