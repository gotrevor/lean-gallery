status:
  scope: >-
    A publish-only showcase: seven finished, axiom-clean formalizations, promoted here from private
    development repos once complete. Every headline is machine-certified twice over --
    `scripts/AxiomCheck.lean` pins each theorem's axiom set with `#guard_msgs`, and
    `leanprover/comparator` (see `comparator_config` below, and .github/workflows/comparator.yml)
    independently certifies that each headline really proves the statement written in a Mathlib-only
    challenge file, replayed through BOTH the Lean kernel and the independent `nanoda` kernel.
  sorry_count: 1
  sorry_in_definitions: 0
  axioms: ["propext", "Quot.sound", "Classical.choice"]

  # The single `sorry` is deliberate and is NOT a gap in any result: it is the STATEMENT of an OPEN
  # conjecture (Erdős [Er88c], transcendence of ∑ 1/(2ⁿ+t)), carried so the open problem can be
  # stated and so the proved conditional `…transcendental.implies_erdos_1050` has something to be
  # conditional on. It is `#guard_msgs`-pinned, so if it is ever proved, the pin trips loudly. It is
  # deliberately excluded from every comparator challenge -- a challenge may contain only theorems
  # the solution actually proves.

  main_results:
    - declaration: "LeanGallery.Logic.Goodstein.goodstein_terminates"
      file: "LeanGallery/Logic/Goodstein/Statement.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "Comparator/Goodstein/config.json"

    - declaration: "LeanGallery.Logic.Hydra.hydra_terminates"
      file: "LeanGallery/Logic/Hydra/Statement.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "Comparator/Hydra/config.json"

    - declaration: "LeanGallery.NumberTheory.Erdos403.erdos_403_finite"
      file: "LeanGallery/NumberTheory/Erdos403/Statement.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "Comparator/Erdos403/config.json"

    - declaration: "LeanGallery.Combinatorics.Erdos1213.erdos_1213"
      file: "LeanGallery/Combinatorics/Erdos1213/Statement.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "Comparator/Erdos1213/config.json"

    - declaration: "LeanGallery.NumberTheory.Erdos1050.erdos_1050"
      file: "LeanGallery/NumberTheory/Erdos1050/Basic.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "Comparator/Erdos1050/config.json"

    - declaration: "LeanGallery.Combinatorics.Erdos880.erdos_880"
      file: "LeanGallery/Combinatorics/Erdos880/Statement.lean"
      sorry_count: 0
      axioms: ["propext", "Quot.sound", "Classical.choice"]
      comparator_config: "Comparator/Erdos880/config.json"

    - declaration: "LeanGallery.NumberTheory.Erdos482.graham_pollak"
