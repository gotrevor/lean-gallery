name = "LeanGallery"
defaultTargets = ["LeanGallery"]

# Enforce Mathlib's per-file copyright/header style locally and in CI, so finished results
# are drop-in ready for upstreaming into Mathlib. `linter.style.header` is a real in-build
# linter (runs during `lake build`, incl. the pre-commit gate) that fires on any file
# reachable from the library root `LeanGallery.lean` (Mathlib's `isInLibraryRoot` heuristic,
# designed to work in downstream projects). `weak.` = applied at build time, not baked into oleans.
[leanOptions]
weak.linter.style.header = true
# Warnings-as-errors (standing preference: warnings "are there for a reason"). `lake build`
# — and so the pre-commit gate + CI — fails on ANY warning, keeping finished results clean.
weak.warningAsError = true

# Mathlib pinned as a DIRECT require at the release tag matching `lean-toolchain` (which is
# also the universe store's key, so `lake-base link` CoW-clones the prebuilt oleans in — no
# 40-min cold build). The tag lives in the `rev` below; naming it again here would only go
# stale on the next bump.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0"

[[lean_lib]]
name = "LeanGallery"

# The comparator harness (Comparator/<Result>/{Challenge,Solution}.lean). NOT in defaultTargets and
# NOT imported by LeanGallery.lean: challenge files carry `sorry` by design, so they must stay out of
# the main build (which is warnings-as-errors). Built on demand by `comparator` itself, and in CI.
[[lean_lib]]
name = "Comparator"
globs = ["Comparator.+"]
