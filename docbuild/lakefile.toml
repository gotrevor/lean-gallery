name = "docbuild"
reservoir = false
version = "0.1.0"
packagesDir = "../.lake/packages"

# doc-gen4's currently-recommended setup (since 2024-11-11): a nested `docbuild`
# sub-project keeps the doc generator and its 4 transitive deps (MD4Lean, BibtexQuery,
# UnicodeBasic, ...) OUT of the main `LeanGallery` build graph. Pinned to the doc-gen4
# release matching our toolchain; bump this `rev` in lockstep with `lean-toolchain`.
[[require]]
scope = "leanprover"
name = "doc-gen4"
rev = "v4.32.0"

[[require]]
name = "LeanGallery"
path = "../"
