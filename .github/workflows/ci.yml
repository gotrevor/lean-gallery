name: CI

on:
  push:
    paths-ignore: ['**.md']
  pull_request:
  workflow_dispatch:

# Supersede stale runs on the same ref — only the latest commit needs to verify + publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write        # actions/deploy-pages publishes to the github-pages environment
  id-token: write     # OIDC token deploy-pages authenticates with

jobs:
  # ---- Reference point of truth --------------------------------------------------------
  # Build the library, then #print axioms for every headline theorem and assert each is the
  # standard mathlib triple (no sorry, no cheat axioms). This is the authoritative "does the
  # repo prove the right thing, honestly" gate. Fast (~3 min on cached Mathlib oleans) and it
  # gates everything downstream — docs don't render or publish unless this is green.
  axioms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # elan + `lake exe cache get` (prebuilt Mathlib oleans) + `lake build`.
      - uses: leanprover/lean-action@v1
      # Runs the checked-in audit file (scripts/AxiomCheck.lean = the imports + one
      # `#print axioms` per headline) and asserts every printed theorem is the standard
      # triple `[propext, Classical.choice, Quot.sound]`. Edit the audit file to add/remove
      # a headline; bump the expected count (13) here to match.
      - name: Axiom-clean gate (reference point of truth)
        run: |
          echo "===== #print axioms (the point of truth) ====="
          lake env lean scripts/AxiomCheck.lean 2>&1 | tee ax.out
          echo "=============================================="
          # `#print axioms` wraps long qualified names across lines, so collapse all
          # whitespace before asserting — else a wrapped headline (e.g. the long-named
          # erdos482_resolution) splits "depends on axioms:" from its triple and would
          # falsely fail the gate. Collapsing makes the per-theorem check wrap-proof.
          collapsed=$(tr '\n' ' ' < ax.out | sed 's/  */ /g')
          if printf '%s' "$collapsed" | grep -q "sorryAx"; then echo "::error::a headline theorem uses sorryAx"; cat ax.out; exit 1; fi
          total=$(printf '%s' "$collapsed" | grep -o "depends on axioms:" | wc -l | tr -d ' ')
          clean=$(printf '%s' "$collapsed" | grep -o "depends on axioms: \[propext, Classical.choice, Quot.sound\]" | wc -l | tr -d ' ')
          if [ "$total" -lt 13 ] || [ "$total" -ne "$clean" ]; then
            echo "::error::a headline theorem has unexpected axioms or is missing (total=$total clean=$clean, want 13)"; cat ax.out; exit 1
          fi
          rm -f ax.out

  # ---- Docs: render + publish, LAST ----------------------------------------------------
  # Kicked off only after the axiom gate is green (needs: axioms), and only on a push to the
  # default branch (or a manual run) — PRs get the fast axiom check but skip the ~2h render.
  # doc-gen4 renders the whole import closure (~1.3 GB, 99.6% Mathlib); trim-docs.py keeps
  # only the gallery pages and relinks deps to the hosted Mathlib docs, so the site is a few MB.
  docs:
    needs: axioms
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push'
          && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false          # we drive the doc build ourselves from docbuild/
      - name: Build API docs (docbuild sub-project)
        run: |
          cd docbuild
          lake exe cache get || true
          lake build LeanGallery:docs
      - name: Trim docs to gallery (relink deps to hosted mathlib4_docs)
        run: python3 docbuild/trim-docs.py docbuild/.lake/build/doc LeanGallery
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

  # ---- Deploy to GitHub Pages (workflow mode, no gh-pages branch) -----------------------
  # Separate job with the github-pages environment, so the deployment attaches to this commit
  # (this is GitHub's + mathlib4_docs' recommended setup: actions/upload-pages-artifact +
  # actions/deploy-pages, no branch-based build).
  deploy:
    needs: docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
