name: CI

on:
  push:
    paths-ignore: ['**.md']
  pull_request:
  workflow_dispatch:

# Supersede stale runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # elan + `lake exe cache get` (prebuilt Mathlib oleans) + `lake build`.
      - uses: leanprover/lean-action@v1
      # Prove the published claim: every headline theorem has no `sorry`, no cheat
      # axioms. Each entry adds its Statement import + `#print axioms` line below; the
      # gate then asserts every printed theorem is the standard mathlib triple.
      - name: Axiom-clean gate
        run: |
          printf 'import LeanGallery.Logic.Goodstein.Statement\nimport LeanGallery.Logic.Hydra.Statement\nimport LeanGallery.NumberTheory.Erdos403.Statement\nimport LeanGallery.Combinatorics.Erdos1213.Statement\nimport LeanGallery.NumberTheory.Erdos1050\nimport LeanGallery.Combinatorics.Erdos880.Statement\nimport LeanGallery.NumberTheory.Erdos482.Statement\n#print axioms LeanGallery.Logic.Goodstein.goodstein_terminates\n#print axioms LeanGallery.Logic.Hydra.hydra_terminates\n#print axioms LeanGallery.NumberTheory.Erdos403.erdos_403_finite\n#print axioms LeanGallery.NumberTheory.Erdos403.erdos_403_sharp\n#print axioms LeanGallery.Combinatorics.Erdos1213.erdos_1213\n#print axioms LeanGallery.Combinatorics.Erdos1213.erdos_1213_f_finite\n#print axioms LeanGallery.NumberTheory.Erdos1050.erdos_1050_irrational\n#print axioms LeanGallery.NumberTheory.Erdos1050.borwein_thm1_abs\n#print axioms LeanGallery.Combinatorics.Erdos880.erdos_880\n#print axioms LeanGallery.Combinatorics.Erdos880.erdos_880_order_two\n#print axioms LeanGallery.NumberTheory.Erdos482.graham_pollak\n#print axioms LeanGallery.NumberTheory.Erdos482.cor33_unconditional\n#print axioms LeanGallery.NumberTheory.Erdos482.General.erdos482_resolution\n' > axcheck.lean
          lake env lean axcheck.lean 2>&1 | tee ax.out
          # `#print axioms` wraps long qualified names across lines, so collapse all
          # whitespace before asserting — else a wrapped headline (e.g. the long-named
          # erdos482_resolution) splits "depends on axioms:" from its triple and would
          # falsely fail the gate. Collapsing makes the per-theorem check wrap-proof.
          collapsed=$(tr '\n' ' ' < ax.out | sed 's/  */ /g')
          if printf '%s' "$collapsed" | grep -q "sorryAx"; then echo "::error::a headline theorem uses sorryAx"; cat ax.out; exit 1; fi
          total=$(printf '%s' "$collapsed" | grep -o "depends on axioms:" | wc -l | tr -d ' ')
          clean=$(printf '%s' "$collapsed" | grep -o "depends on axioms: \[propext, Classical.choice, Quot.sound\]" | wc -l | tr -d ' ')
          if [ "$total" -lt 13 ] || [ "$total" -ne "$clean" ]; then
            echo "::error::a headline theorem has unexpected axioms or is missing (total=$total clean=$clean, want 13)"; cat ax.out; exit 1
          fi
          rm -f axcheck.lean ax.out
