name: CI

on:
  push:
    paths-ignore: ['**.md']
  pull_request:
  workflow_dispatch:

# Supersede stale runs on the same ref — only the latest commit needs to verify + publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write        # actions/deploy-pages publishes to the github-pages environment
  id-token: write     # OIDC token deploy-pages authenticates with

jobs:
  # ---- Reference point of truth --------------------------------------------------------
  # Build the library, then #print axioms for every headline theorem and assert each is the
  # standard mathlib triple (no sorry, no cheat axioms). This is the authoritative "does the
  # repo prove the right thing, honestly" gate. Fast (~3 min on cached Mathlib oleans) and it
  # gates everything downstream — docs don't render or publish unless this is green.
  axioms:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      # elan + `lake exe cache get` (prebuilt Mathlib oleans) + `lake build`.
      - uses: leanprover/lean-action@v1
      # Runs the checked-in audit file (scripts/AxiomCheck.lean = the imports + one guarded
      # `#print axioms` per headline). Each print is wrapped in `#guard_msgs` asserting the
      # standard triple `[propext, Classical.choice, Quot.sound]`, so any drift (a new axiom,
      # a `sorry`/`sorryAx`, or a renamed/removed theorem) makes the file fail to elaborate —
      # the exit code IS the gate. Add/remove a headline by editing the audit file only; the
      # well-formedness check below has no count to keep in sync.
      - name: Axiom-clean gate (reference point of truth)
        run: |
          # A clean run is SILENT (the guards consume their messages); axiom drift makes
          # this exit non-zero. No output parsing — the exit code is the gate.
          lake env lean scripts/AxiomCheck.lean
          # Belt-and-suspenders: the audit file is the single source of truth for the set of
          # headlines, so don't duplicate its size here. Assert only that it's well-formed —
          # every `#print axioms` has a matching `#guard_msgs` guard (an orphaned print would
          # slip axiom drift past the gate) and the gate isn't empty. Adding/removing a headline
          # needs no edit here.
          prints=$(grep -c '^#print axioms ' scripts/AxiomCheck.lean)
          guards=$(grep -c '^#guard_msgs (whitespace := lax) in$' scripts/AxiomCheck.lean)
          if [ "$prints" -ne "$guards" ] || [ "$prints" -eq 0 ]; then
            echo "::error::AxiomCheck.lean malformed: need one #guard_msgs per #print axioms, ≥1 (prints=$prints guards=$guards)"; exit 1
          fi
          # Visibility: the gate above is SILENT on success — `#guard_msgs` has no verbose mode.
          # Its filter actions are `check` (assert + consume the message), `drop` (hide, no check),
          # and `pass` (echo, no check); none both asserts *and* echoes. So the gate proves
          # cleanliness but prints nothing. Echo the audited manifest here so the log shows WHAT was
          # certified. The `info:` docstrings are exactly what the gate just confirmed the live
          # `#print axioms` output equals, so this is an accurate summary (reached only on exit 0),
          # not a second unchecked run.
          echo "::notice::Axiom audit — $prints headline theorems certified [propext, Classical.choice, Quot.sound]"
          echo "::group::Axiom audit — $prints headlines, each confirmed axiom-clean by the gate above"
          grep -oE "'[^']+' depends on axioms: \[[^]]+\]" scripts/AxiomCheck.lean | cat -n
          echo "::endgroup::"
          { echo "### 🔒 Axiom audit: $prints headlines certified clean";
            echo "All prove from the standard triple \`[propext, Classical.choice, Quot.sound]\` — no \`sorry\`, no custom axioms:";
            grep '^#print axioms ' scripts/AxiomCheck.lean | sed 's|^#print axioms |- \`|; s|$|\`|';
          } >> "$GITHUB_STEP_SUMMARY"

  # ---- Docs: render + publish, LAST ----------------------------------------------------
  # Kicked off only after the axiom gate is green (needs: axioms), and only on a push to the
  # default branch (or a manual run) — PRs get the fast axiom check but skip the ~2h render.
  # doc-gen4 renders the whole import closure (~1.3 GB, 99.6% Mathlib); trim-docs.py keeps
  # only the gallery pages and relinks deps to the hosted Mathlib docs, so the site is a few MB.
  docs:
    needs: axioms
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push'
          && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false          # we drive the doc build ourselves from docbuild/
      - name: Build API docs (docbuild sub-project)
        run: |
          cd docbuild
          lake exe cache get || true
          lake build LeanGallery:docs
      - name: Trim docs to gallery (relink deps to hosted mathlib4_docs)
        run: python3 docbuild/trim-docs.py docbuild/.lake/build/doc LeanGallery
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

  # ---- Deploy to GitHub Pages (workflow mode, no gh-pages branch) -----------------------
  # Separate job with the github-pages environment, so the deployment attaches to this commit
  # (this is GitHub's + mathlib4_docs' recommended setup: actions/upload-pages-artifact +
  # actions/deploy-pages, no branch-based build).
  deploy:
    needs: docs
    runs-on: ubuntu-26.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
