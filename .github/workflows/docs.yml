# API documentation (doc-gen4), built from the nested `docbuild/` sub-project.
#
# DROP-IN: this file is repo-agnostic. To adopt it, just add a `docbuild/` sub-project
# (doc-gen4's currently-recommended setup) and commit this workflow unchanged. The parent
# library name is auto-detected from `docbuild/lakefile.toml`; `main`/`master` are both
# handled. (Multi-library repos: edit the single `lake build` line below.)
#
# Deliberately a SEPARATE, non-required workflow from the build/test CI (which stays the
# merge gate). A docs break is an honest red X that never blocks a merge.
#
# Publishing model: GitHub Pages source = "GitHub Actions" (build_type=workflow). This
# workflow builds the site and deploys it DIRECTLY via actions/deploy-pages — there is NO
# gh-pages branch, so GitHub's legacy `pages-build-deployment` never runs. That legacy
# branch-deploy was the source of the jank: an orphaned "GitHub Pages / queued" check-suite
# that never resolves on the source commit, plus intermittent "Deployment failed, try again
# later" races between two deployers fighting over the one github-pages environment. With
# the artifact deployed straight from this run, the deployment attaches to THIS commit and
# resolves to a single clean green check.
#
# Build cadence — docs build ONLY off the default branch, release/rc tags, or on-demand;
# never on an arbitrary PR:
#   • push to main/master   → build + deploy to Pages (the source of truth)
#   • v* tag (incl. -rcN)   → build only; rc tags mirror the Lean toolchain, i.e. exactly
#                             when doc-gen4 tends to break across a bump
#   • PR touching a build-
#     sensitive file        → build only (auto shift-left: toolchain / lakefile / manifest
#                             / docbuild are the doc-gen4 breakers)
#   • on-demand PR          → add the `force-docs` label, or push a `*-force-docs` branch
#   • ordinary PR           → builds NOTHING (0 doc-CI minutes)
name: docs

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# GitHub Pages' recommended settings: one queue, and NEVER cancel an in-progress deploy —
# cancelling mid-deploy is what leaves the github-pages environment in an errored state.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write          # actions/deploy-pages publishes to the github-pages environment
  id-token: write       # OIDC token deploy-pages authenticates with
  pull-requests: read   # paths-filter reads the PR's changed-file list

jobs:
  # Cheap (~seconds) gate: did this change touch a doc-gen4-breaking file?
  changes:
    runs-on: ubuntu-latest
    outputs:
      sensitive: ${{ steps.filter.outputs.sensitive }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sensitive:
              - 'lean-toolchain'
              - 'lakefile.*'
              - 'lake-manifest.json'
              - 'docbuild/**'

  docs:
    needs: changes
    if: >
      github.event_name == 'push'
      || needs.changes.outputs.sensitive == 'true'
      || contains(github.event.pull_request.labels.*.name, 'force-docs')
      || endsWith(github.head_ref, '-force-docs')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # elan only; we drive the build ourselves inside docbuild/ (the parent lib is
      # compiled as a dependency of the `:docs` facet, using cached Mathlib oleans).
      - uses: leanprover/lean-action@v1
        with:
          build: false
      - name: Build API docs (docbuild sub-project)
        run: |
          cd docbuild
          # Auto-detect the parent library: the `[[require]]` whose `path` points at "../".
          LIB=$(awk '
            /^[[:space:]]*\[\[require\]\]/        { name="" }
            /^[[:space:]]*name[[:space:]]*=/      { l=$0; sub(/.*=[[:space:]]*"/,"",l); sub(/".*/,"",l); name=l }
            /^[[:space:]]*path[[:space:]]*=[[:space:]]*"\.\.\/?"/ { print name; exit }
          ' lakefile.toml)
          if [ -z "$LIB" ]; then echo "::error::could not detect parent library from docbuild/lakefile.toml"; exit 1; fi
          echo "Building docs for library: $LIB"
          echo "DOC_LIB=$LIB" >> "$GITHUB_ENV"   # hand the lib name to the trim step
          lake exe cache get || true
          lake build "$LIB:docs"
      # doc-gen4 renders the WHOLE import closure (~1.3 GB, 99.6% Mathlib). Keep only
      # the gallery library's pages and rewrite dependency links to the hosted Mathlib
      # docs, so the published site is a few MB. See docbuild/trim-docs.py for the why.
      - name: Trim docs to gallery (link deps to hosted mathlib4_docs)
        run: python3 docbuild/trim-docs.py docbuild/.lake/build/doc "$DOC_LIB"
      # Upload the trimmed site as the Pages artifact (only when we'll actually deploy).
      - name: Upload Pages artifact
        if: >
          github.event_name == 'push'
          && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

  # Deploy the uploaded artifact straight to the github-pages environment. Runs only on a
  # push to the default branch, so the deployment attaches to THAT commit and shows a single
  # clean green check — no gh-pages branch, no legacy pages-build-deployment, no orphaned
  # "GitHub Pages / queued" suite.
  deploy:
    needs: docs
    if: >
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
